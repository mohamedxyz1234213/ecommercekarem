    <!-- Structured Data: Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "vybe",
      "url": "https://vybe.store",
      "logo": "https://vybe.store/image.png",

      "sameAs": []

    <!-- Structured Data: WebSite with SearchAction -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "vybe",
      "url": "https://vybe.store",
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "https://vybe.store/shop?search={search_term_string}"
        },
        "query-input": "required name=search_term_string"
      }
    }
    </script>
